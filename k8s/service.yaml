apiVersion: v1
kind: Service

metadata:
  name: gestionusuarios-service
  namespace: microservices-demo
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing

spec:
  type: LoadBalancer
  loadBalancerClass: eks.amazonaws.com/nlb

  selector:
    app: gestionusuarios

  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080