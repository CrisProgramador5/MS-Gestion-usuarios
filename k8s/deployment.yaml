apiVersion: apps/v1
kind: Deployment

metadata:
  name: gestionusuarios-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: gestionusuarios

  template:
    metadata:
      labels:
        app: gestionusuarios

    spec:
      containers:
        - name: gestionusuarios

          image: pankuki/gestionusuarios:latest

          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://gestion-db.cy9mdiqbv1zz.us-east-1.rds.amazonaws.com:3306/gestionusuarios"

            - name: SPRING_DATASOURCE_USERNAME
              value: "admin"

            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: password

            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"