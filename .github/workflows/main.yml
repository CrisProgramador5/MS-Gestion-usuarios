name: CI/CD Pipeline

on:
  push:
    branches:
    - main

jobs:

# =========================
# 1. TEST + JACOCO
# =========================

  test:
    name: Run Tests with JaCoCo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Give execute permission to Maven Wrapper
        run: chmod +x mvnw

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Run Tests
        run: ./mvnw clean test

      - name: Generate JaCoCo Report
        run: ./mvnw jacoco:report

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

# =========================
# 2. SONARCLOUD
# =========================

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Give execute permission to Maven Wrapper
        run: chmod +x mvnw

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw verify sonar:sonar \
          -Dsonar.projectKey=CrisProgramador5_MS-Gestion-usuarios \
          -Dsonar.organization=crisprogramador5 \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.token=$SONAR_TOKEN

# =========================
# 3. BUILD FINAL
# =========================

  build:
    name: Build JAR
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Give execute permission to Maven Wrapper
        run: chmod +x mvnw

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build JAR
        run: ./mvnw package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

# =========================
# 4. PUSH DOCKER HUB
# =========================

  dockerhub:
    name: Push Docker Hub
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/gestionusuarios:${{ github.sha }} .

      - name: Push Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/gestionusuarios:${{ github.sha }}
          
# =========================
# 6. DEPLOY TO AMAZON EKS
# =========================

  deploy:
    name: Deploy to Amazon EKS
    runs-on: ubuntu-latest
    needs: dockerhub

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region us-east-1 \
            --name gestion-cluster

      - name: Verify cluster connection
        run: |
          kubectl get nodes

      - name: Update Deployment Image
  run: |
    kubectl set image deployment/gestionusuarios-deployment \
      gestionusuarios=${{ secrets.DOCKER_USERNAME }}/gestionusuarios:${{ github.sha }} \
      -n microservices-demo

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/gestionusuarios-deployment \
            -n microservices-demo \
            --timeout=300s

      - name: Verify Pods
        run: |
          kubectl get pods -n microservices-demo

